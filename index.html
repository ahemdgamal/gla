<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Glamour Accessories - Full System</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&display=swap" rel="stylesheet">
    <style>
        /* --- CSS الموحد --- */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Playfair Display', serif; background: #fdfaf6; color: #3b2b2b; transition: 0.3s; }
        header { display: flex; justify-content: space-between; align-items: center; padding: 20px 60px; background: #3b2b2b; position: sticky; top: 0; z-index: 1000; }
        .logo-text { color: #d4af37; font-size: 24px; font-weight: bold; text-decoration: none; cursor: pointer; }
        nav a { color: #d4af37; margin-left: 25px; text-decoration: none; font-weight: bold; cursor: pointer; font-size: 14px; }
        .section { display: none; padding: 20px; min-height: 80vh; }
        .active { display: block; }

        /* Hero */
        .hero { text-align: center; padding: 80px 20px; background: #3b2b2b; color: white; }
        .hero h1 { font-size: 3rem; margin-bottom: 10px; }

        /* Products Grid */
        .products-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 30px; padding: 40px; }
        .product-card { background: white; padding: 15px; border: 1px solid #eee; text-align: center; position: relative; cursor: pointer; transition: 0.3s; }
        .product-card:hover { transform: translateY(-5px); box-shadow: 0 10px 20px rgba(0,0,0,0.1); }
        .product-card img { width: 100%; height: 300px; object-fit: cover; margin-bottom: 15px; }
        .badge { position: absolute; top: 10px; left: 10px; background: #d4af37; color: white; padding: 5px 10px; font-size: 10px; font-weight: bold; }
        .price { color: #d4af37; font-weight: bold; font-size: 1.2rem; }
        .old-price { text-decoration: line-through; color: #aaa; font-size: 0.9rem; margin-left: 5px; }

        /* Forms */
        .login-box, .admin-form { max-width: 450px; margin: 50px auto; background: white; padding: 30px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); border-radius: 4px; }
        h2 { margin-bottom: 20px; text-align: center; color: #3b2b2b; }
        input, textarea { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; outline: none; font-family: inherit; }
        button { width: 100%; padding: 14px; background: #3b2b2b; color: white; border: none; cursor: pointer; font-weight: bold; text-transform: uppercase; letter-spacing: 1px; transition: 0.3s; }
        button:hover { background: #d4af37; color: #3b2b2b; }
        .upload-btn { background: #f3f3f3; color: #333; border: 1px dashed #d4af37; margin-bottom: 10px; }

        /* Admin Management */
        .admin-item { display: flex; justify-content: space-between; align-items: center; padding: 15px; border-bottom: 1px solid #eee; background: white; margin-bottom: 5px; }
        .admin-item button { width: auto; background: #c0392b; padding: 5px 15px; font-size: 12px; }
    </style>
</head>
<body>

<header>
    <div class="logo-text" onclick="showSection('home')">GLAMOUR</div>
    <nav>
        <a onclick="showSection('home')">Home</a>
        <a id="navLogin" onclick="showSection('login')">Login</a>
        <a id="navAdmin" onclick="showSection('admin')" style="display:none;">Admin</a>
        <a id="navLogout" style="display:none;">Logout</a>
    </nav>
</header>

<div id="home" class="section active">
    <section class="hero">
        <h1>Luxury Accessories</h1>
        <p>Elegant • Premium • Glamour</p>
    </section>
    <div id="productsDisplay" class="products-grid"></div>
</div>

<div id="login" class="section">
    <div class="login-box">
        <h2>Login</h2>
        <input type="email" id="loginEmail" placeholder="Email">
        <input type="password" id="loginPass" placeholder="Password">
        <button id="btnLoginAction">Login</button>
        <p style="margin-top:20px; text-align:center; cursor:pointer; font-size: 14px;" id="btnRegisterAction">Create Account</p>
    </div>
</div>

<div id="admin" class="section">
    <div class="admin-form">
        <h2>Admin Panel</h2>
        <input type="text" id="pName" placeholder="Product Name">
        <textarea id="pDesc" placeholder="Description"></textarea>
        <input type="number" id="pPrice" placeholder="Price (EGP)">
        <input type="number" id="pOldPrice" placeholder="Old Price (Optional)">
        
        <label style="font-size: 13px; font-weight: bold;">Product Image:</label>
        <input type="file" id="pImageFile" accept="image/*" class="upload-btn">
        
        <label style="font-size: 14px; display: block; margin-bottom: 10px;">
            <input type="checkbox" id="pIsNew"> Show "NEW" Badge?
        </label>
        
        <button id="btnAddProduct">Upload & Add Product</button>
        <p id="uploadStatus" style="font-size: 12px; color: #d4af37; text-align: center; margin-top: 10px;"></p>
    </div>
    <div id="adminProductsList" style="max-width: 600px; margin: 30px auto;"></div>
</div>

<div id="productDetail" class="section">
    <div id="detailContent" style="max-width: 900px; margin: 50px auto; display: flex; gap: 40px; background: white; padding: 30px; box-shadow: 0 10px 30px rgba(0,0,0,0.05);">
        </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
    import { getFirestore, collection, addDoc, getDocs, deleteDoc, doc, getDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore.js";
    import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-auth.js";
    import { getStorage, ref, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-storage.js";

    const firebaseConfig = {
        apiKey: "AIzaSyDZZGFzfqGdS1xt276jpDrT18mhFhWgIf8",
        authDomain: "glamour-831f8.firebaseapp.com",
        projectId: "glamour-831f8",
        storageBucket: "glamour-831f8.firebasestorage.app",
        messagingSenderId: "276384349032",
        appId: "1:276384349032:web:0b8885f570be09de5f34dd",
        measurementId: "G-PF7C6S6DLC"
    };

    // Initialize Firebase
    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const auth = getAuth(app);
    const storage = getStorage(app);
    const adminEmail = "glamour@gmail.com";

    // --- Navigation ---
    window.showSection = (id) => {
        document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
        const target = document.getElementById(id);
        if(target) target.classList.add('active');
        
        if(id === 'home') loadProducts();
        if(id === 'admin') loadAdminProducts();
        window.scrollTo(0,0);
    };

    // --- Auth Observer ---
    onAuthStateChanged(auth, (user) => {
        const navLogin = document.getElementById("navLogin");
        const navLogout = document.getElementById("navLogout");
        const navAdmin = document.getElementById("navAdmin");

        if (user) {
            navLogin.style.display = "none";
            navLogout.style.display = "inline";
            if (user.email === adminEmail) navAdmin.style.display = "inline";
        } else {
            navLogin.style.display = "inline";
            navLogout.style.display = "none";
            navAdmin.style.display = "none";
        }
    });

    // --- Auth Actions ---
    document.getElementById("btnLoginAction").onclick = async () => {
        const email = document.getElementById("loginEmail").value;
        const pass = document.getElementById("loginPass").value;
        try {
            await signInWithEmailAndPassword(auth, email, pass);
            alert("Welcome back!");
            showSection('home');
        } catch (e) { alert(e.message); }
    };

    document.getElementById("btnRegisterAction").onclick = async () => {
        const email = document.getElementById("loginEmail").value;
        const pass = document.getElementById("loginPass").value;
        try {
            await createUserWithEmailAndPassword(auth, email, pass);
            alert("Account created!");
        } catch (e) { alert(e.message); }
    };

    document.getElementById("navLogout").onclick = () => {
        signOut(auth).then(() => showSection('home'));
    };

    // --- Store Logic (Load & View) ---
    async function loadProducts() {
        const container = document.getElementById("productsDisplay");
        container.innerHTML = "<p style='grid-column:1/-1; text-align:center;'>Luxury is loading...</p>";
        try {
            const querySnapshot = await getDocs(collection(db, "products"));
            container.innerHTML = "";
            querySnapshot.forEach((docSnap) => {
                const p = docSnap.data();
                container.innerHTML += `
                    <div class="product-card" onclick="viewProduct('${docSnap.id}')">
                        ${p.isNew ? '<div class="badge">NEW</div>' : ''}
                        <img src="${p.image || 'https://via.placeholder.com/300'}" onerror="this.src='https://via.placeholder.com/300'">
                        <h3>${p.name}</h3>
                        <p class="price">${p.price} EGP ${p.oldPrice ? `<span class="old-price">${p.oldPrice}</span>` : ''}</p>
                        <button style="margin-top:15px; padding:10px;">View Details</button>
                    </div>
                `;
            });
        } catch(e) { container.innerHTML = "Error: " + e.message; }
    }

    window.viewProduct = async (id) => {
        try {
            const snap = await getDoc(doc(db, "products", id));
            if(!snap.exists()) return;
            const p = snap.data();
            const detail = document.getElementById("detailContent");
            detail.innerHTML = `
                <img src="${p.image}" style="width:45%; height: 450px; object-fit: cover;">
                <div style="flex: 1;">
                    <h2 style="text-align: left; font-size: 2.5rem; margin-bottom: 15px;">${p.name}</h2>
                    <p style="color: #666; line-height: 1.8; margin-bottom: 25px;">${p.description}</p>
                    <h3 class="price" style="font-size: 2rem; margin-bottom: 25px;">${p.price} EGP</h3>
                    <button onclick="alert('Paymob Gateway - Coming Soon')">Buy Now</button>
                    <button onclick="showSection('home')" style="background: #eee; color: #333; margin-top: 10px;">Back to Shop</button>
                </div>
            `;
            showSection('productDetail');
        } catch(e) { alert(e.message); }
    };

    // --- Admin Logic (Upload File & Delete) ---
    document.getElementById("btnAddProduct").onclick = async () => {
        const name = document.getElementById("pName").value;
        const price = document.getElementById("pPrice").value;
        const file = document.getElementById("pImageFile").files[0];
        const status = document.getElementById("uploadStatus");

        if(!name || !price || !file) return alert("Please provide Name, Price, and Image!");

        try {
            status.innerText = "Processing Luxury Image... ⏳";
            
            // 1. Upload to Storage
            const storageRef = ref(storage, `products/${Date.now()}_${file.name}`);
            const uploadTask = await uploadBytes(storageRef, file);
            const imageURL = await getDownloadURL(uploadTask.ref);

            // 2. Save to Firestore
            await addDoc(collection(db, "products"), {
                name: name,
                description: document.getElementById("pDesc").value,
                price: Number(price),
                oldPrice: Number(document.getElementById("pOldPrice").value) || 0,
                image: imageURL,
                isNew: document.getElementById("pIsNew").checked,
                createdAt: serverTimestamp()
            });

            alert("Product added successfully with image!");
            status.innerText = "";
            document.getElementById("pName").value = "";
            document.getElementById("pPrice").value = "";
            document.getElementById("pImageFile").value = "";
            loadAdminProducts();
        } catch(e) { 
            alert(e.message); 
            status.innerText = "";
        }
    };

    async function loadAdminProducts() {
        const container = document.getElementById("adminProductsList");
        container.innerHTML = "<h3>Inventory</h3>";
        const querySnapshot = await getDocs(collection(db, "products"));
        querySnapshot.forEach((docSnap) => {
            const p = docSnap.data();
            const item = document.createElement('div');
            item.className = 'admin-item';
            item.innerHTML = `
                <span><strong>${p.name}</strong> - ${p.price} EGP</span>
                <button onclick="deleteProduct('${docSnap.id}')">Delete</button>
            `;
            container.appendChild(item);
        });
    }

    window.deleteProduct = async (id) => {
        if(confirm("Are you sure you want to delete this piece?")) {
            await deleteDoc(doc(db, "products", id));
            loadAdminProducts();
        }
    };

    // Start
    loadProducts();
</script>
</body>
</html>
